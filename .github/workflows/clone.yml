name: Clone Private Repo
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  clone-sample:
    runs-on: ubuntu-latest
    steps:
    - name: generate token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ secrets.TOKEN_GEN_APP_CLIENT_ID }}
        private-key: ${{ secrets.TOKEN_GEN_PRIVATE_KEY }}
        owner: jyuzen-sw
        repository: jyuzen-sw/homepage
        permissions: '{"contents":"read", "metadata":"read"}'

    - name: DEBUG token
      env:
        TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        echo "The generated token is masked: ${TOKEN}"

    - name: DEBUG token access
      run: |
        curl -s -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/jyuzen-sw/homepage | jq '.message // .'

    - name: Checkout private repo
      uses: actions/checkout@v4
      with:
        repository: jyuzen-sw/homepage
        ref: main
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    
    - name: DEBUG dump file list
      run: ls -al
